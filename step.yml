#
# A couple of useful guides & docs:
#
# - Main Bitrise CLI docs: https://github.com/bitrise-io/bitrise/tree/master/_docs
# - Step Development Guideline: https://github.com/bitrise-io/bitrise/blob/master/_docs/step-development-guideline.md
# - Bitrise.yml format spec: https://github.com/bitrise-io/bitrise/blob/master/_docs/bitrise-yml-format-spec.md
# - Bitrise docs: http://devcenter.bitrise.io/
# - Bitrise CLI guides: http://devcenter.bitrise.io/bitrise-cli/

title: |-
  Semaloop Submit Build
summary: |
  Submits an iOS build to Semaloop and enqueues tests.
description: |
  Submits an iOS build to Semaloop and enqueues tests.
website: https://github.com/semaloop/bitrise-step-semaloop-submit-build
source_code_url: https://github.com/semaloop/bitrise-step-semaloop-submit-build
support_url: https://github.com/semaloop/bitrise-step-semaloop-submit-build/issues

# If this step should be available only for certain project types
# just uncomment this `project_type_tags` section and include all the
# project types supported by the step. If the step can be used for all
# project types then you can just remove this section.
# If no `project_type_tags` specified (or specified as an empty array)
# that means the step can be used for any project type.
# You can find more information about project type tags in the Step Development Guideline:
# https://github.com/bitrise-io/bitrise/blob/master/_docs/step-development-guideline.md
#
project_type_tags:
  - ios
#   - macos
#   - android
#   - xamarin
#   - react-native
#   - cordova
#   - ionic
#   - flutter

# Type tags are used for categorizing steps, for easier step discovery in Step Libraries.
# You can find more information about type tags in the Step Development Guideline:
# https://github.com/bitrise-io/bitrise/blob/master/_docs/step-development-guideline.md
type_tags:
  - deploy

# These properties define whether a Step is run in a given Workflow or not.
# You can find more information about this in the documentation here:
# https://devcenter.bitrise.io/en/steps-and-workflows/developing-your-own-bitrise-step/developing-a-new-step.html#setting-conditions-for-running-the-step
#
# is_always_run: false
# is_skippable: false
# run_if: ""

# Use the `deps` property to declare dependencies that you can fetch from an OS dependency manager.
# You can find more information about this in the documentation here:
# https://devcenter.bitrise.io/en/steps-and-workflows/developing-your-own-bitrise-step/developing-a-new-step.html#submodules-and-step-dependencies
#
# deps:
#   brew:
#   - name: cmake
#   apt_get:
#   - name: cmake


toolkit:
  bash:
    entry_file: step.sh


inputs:
  - api_key: "$SEMALOOP_API_KEY"
    opts:
      title: "Semaloop API key"
      is_required: true
      is_sensitive: true

  - app_path: "$BITRISE_APP_PATH"
    opts:
      title: "Simulator .app path"
      summary: "Direct path to a simulator `.app` bundle. Takes precedence over `test_bundle_path`."
      is_required: false

  - test_bundle_path: "$BITRISE_TEST_BUNDLE_PATH"
    opts:
      title: "Test bundle directory"
      summary: "Directory to search for a simulator `.app` bundle (e.g. the `BITRISE_TEST_BUNDLE_PATH` output of the Xcode Build for Testing step). Ignored if `app_path` is set."
      is_required: false

  - ipa_path: "$BITRISE_IPA_PATH"
    opts:
      title: "Device .ipa path"
      summary: "Path to the signed .ipa file. Produced by the Xcode Archive & Export step."
      is_required: false